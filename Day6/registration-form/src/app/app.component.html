<div class="container">

<form [formGroup]="registerForm"  (ngSubmit)="onSubmit()">
    <h2>Registration Form</h2>
  <div>
    <label for="username">Username  </label>
    <input type="text" id="username" formControlName="username">

    <div *ngIf="username && username.invalid && (username.dirty || username.touched)">
      <div *ngIf="username.errors?.['required']">
        Username is required.
      </div>
      <div *ngIf="username.errors?.['minlength']">
        Username must be at least 3 characters.
      </div>
    </div>
  </div>

  <br>

  <div>
    <label for="password">Password  </label>
    <input type="password" id="password" formControlName="password">

    <div *ngIf="password && password.invalid && (password.dirty || password.touched)">
      <div *ngIf="password.errors?.['required']">
        Password is required.
      </div>
      <div *ngIf="password.errors?.['minlength']">
        Password must be at least 6 characters.
      </div>
    </div>
  </div>

  <br>

  <div>
    <label for="confirmPassword">Confirm Password  </label>
    <input type="password" id="confirmPassword" formControlName="confirmPassword">

    <div *ngIf="confirmPassword && confirmPassword.invalid && (confirmPassword.dirty || confirmPassword.touched)">
      Confirm Password is required.
    </div>
  </div>

  <br>

  <button type="submit" [disabled]="!registerForm.valid">
    Submit
  </button>

</form>
</div>
