<h2>Add Product</h2>

<form [formGroup]="productForm" (ngSubmit)="save()">

<label>Name</label><br>
<input type="text" formControlName="name"><br><br>

<label>Price</label><br>
<input type="number" formControlName="price"><br><br>

<label>Category</label><br>
<input type="text" formControlName="category"><br><br>

<label>Quantity</label><br>
<input type="number" formControlName="quantity"><br><br>

<button type="submit"> Save </button>

</form>
