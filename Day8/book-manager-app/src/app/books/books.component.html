<h2>Book List</h2>

<br><br>

<table border="1" cellpadding="10">

<tr>
  <th>Title</th>
  <th>Author</th>
  <th>Year</th>
  <th>Genre</th>
  <th>Action</th>
</tr>

<tr *ngFor="let book of books">

<td>{{book.title}}</td>
<td>{{book.author}}</td>
<td>{{book.published_year}}</td>
<td>{{book.genre}}</td>

<td>

<button button [routerLink]="['/edit', book.id]" style="margin-right: 10px;"> Edit </button>

<button (click)="delete(book.id!)"> Delete </button>

</td>

</tr>

</table>
