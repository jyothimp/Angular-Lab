<h2>Edit Book</h2>

<form [formGroup]="bookForm" (ngSubmit)="update()">

<label>Title</label><br>
<input type="text" formControlName="title"><br><br>

<label>Author</label><br>
<input type="text" formControlName="author"><br><br>

<label>Published Year</label><br>
<input type="number" formControlName="published_year"><br><br>

<label>Genre</label><br>
<input type="text" formControlName="genre"><br><br>

<button type="submit"> Update </button>

</form>
