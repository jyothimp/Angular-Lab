<h2>Student List</h2>

<button (click)="logout()">Logout</button>

<br><br>

<table border="1" cellpadding="10">
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Course</th>
  </tr>

  <tr *ngFor="let student of students">
    <td>{{student.id}}</td>
    <td>{{student.name}}</td>
    <td>{{student.email}}</td>
    <td>{{student.course}}</td>
  </tr>

</table>
