<h2>Book List</h2>

<table border="1">
  <tr>
    <th>Title</th>
    <th>Author</th>
    <th>Published Year</th>
    <th>Genre</th>
  </tr>
  <tr *ngFor="let book of books">
    <td>{{ book.title }}</td>
    <td>{{ book.author }}</td>
    <td>{{ book.published_year }}</td>
    <td>{{ book.genre }}</td>
  </tr>
</table>
